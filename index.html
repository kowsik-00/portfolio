<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Player</title>

<style>

body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

#searchBox{
padding:10px;
width:250px;
font-size:16px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.song{
background:#222;
padding:10px;
margin:10px;
border-radius:8px;
display:flex;
align-items:center;
justify-content:space-between;
}

.song img{
width:60px;
border-radius:6px;
}

.song-info{
flex:1;
text-align:left;
margin-left:10px;
}

</style>

</head>

<body>

<h2>🎵 Music Player</h2>

<input id="searchBox" placeholder="Search songs">
<button onclick="searchMusic()">Search</button>

<div id="songs"></div>

<audio id="player" controls style="margin-top:20px;width:80%"></audio>

<script>

function searchMusic(){

let query = document.getElementById("searchBox").value;

let script = document.createElement("script");

script.src =
"https://api.deezer.com/search?q=" +
query +
"&output=jsonp&callback=showSongs";

document.body.appendChild(script);

}

function showSongs(data){

let container = document.getElementById("songs");

container.innerHTML = "";

data.data.forEach(song => {

let div = document.createElement("div");
div.className = "song";

let img = document.createElement("img");
img.src = song.album.cover_medium;

let info = document.createElement("div");
info.className = "song-info";
info.innerHTML =
"<b>" + song.title + "</b><br>" +
song.artist.name;

let btn = document.createElement("button");
btn.innerText = "Play";

btn.onclick = function(){
let player = document.getElementById("player");
player.src = song.preview;
player.play();
}

div.appendChild(img);
div.appendChild(info);
div.appendChild(btn);

container.appendChild(div);

});

}

</script>

</body>
</html>
