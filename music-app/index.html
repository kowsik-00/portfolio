<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Music App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Music Explorer</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for songs, artists...">
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main>
            <div id="results" class="results-grid">
                <div class="placeholder-text">Search for your favorite tracks to get started!</div>
            </div>
        </main>
    </div>

    <!-- Spotify-style Bottom Player -->
    <div class="bottom-player" id="bottomPlayer">
        <div class="now-playing">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" alt="Album Art" id="playerImage" class="player-image">
            <div class="track-info">
                <div class="player-title" id="playerTitle">No track selected</div>
                <div class="player-artist" id="playerArtist">-</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn" id="prevBtn" title="Previous">⏮</button>
                <button class="control-btn play-btn" id="playPauseBtn" title="Play/Pause">▶️</button>
                <button class="control-btn" id="nextBtn" title="Next">⏭</button>
            </div>
            <div class="progress-container">
                <span class="time" id="currentTime">0:00</span>
                <div class="progress-bar-bg" id="progressBarBg">
                    <div class="progress-bar-fill" id="progressBarFill"></div>
                </div>
                <span class="time" id="totalTime">0:30</span>
            </div>
        </div>
        
        <div class="volume-controls">
            <span class="volume-icon">🔊</span>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <!-- YouTube player container (hidden, used for audio playback) -->
    <div id="ytPlayerContainer" style="position: absolute; width: 0; height: 0; overflow: hidden; left: -9999px;"></div>

    <script src="app.js"></script>
</body>
</html>
